// ─── Utils ────────────────────────────────────────────────────────────────────
const groupTotal = (g) => g.members.reduce((s, m) => s + m.points, 0);
const sortGroups = (gs) => [...gs].sort((a, b) => groupTotal(b) - groupTotal(a));
const allPlayers = (gs) =>
  gs.flatMap((g) => g.members.map((m) => ({ ...m, gName: g.name, gColor: g.color, gEmoji: g.emoji, gId: g.id })))
    .sort((a, b) => b.points - a.points);
const sto = {
  get: (k, fb) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; } catch { return fb; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};

// ─── PinDots ──────────────────────────────────────────────────────────────────
function PinDots({ total, filled, color }) {
  return (
    <div style={{ display: "flex", gap: 10, justifyContent: "center", marginBottom: 18 }}>
      {Array.from({ length: total }).map((_, i) => (
        <div key={i} style={{
          width: 13, height: 13, borderRadius: "50%",
          background: i < filled ? color : "transparent",
          border: `2px solid ${i < filled ? color : "#444"}`,
          transition: "all 0.15s",
          transform: i < filled ? "scale(1.25)" : "scale(1)",
        }} />
      ))}
    </div>
  );
}

// ─── Numpad ───────────────────────────────────────────────────────────────────
function Numpad({ onPress, onDel }) {
  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 8, marginBottom: 14 }}>
      {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((k, i) => (
        <button key={i}
          onClick={() => k === "⌫" ? onDel() : k !== "" ? onPress(String(k)) : null}
          disabled={k === ""}
          style={{
            padding: "15px 0", borderRadius: 12, border: "1px solid #2a2a3a",
            background: k === "" ? "transparent" : k === "⌫" ? "#1e1e2e" : "#1a1a2a",
            color: k === "⌫" ? "#f87171" : "#f0f0f0",
            fontSize: k === "⌫" ? 17 : 19, fontWeight: 700,
            cursor: k === "" ? "default" : "pointer",
            fontFamily: "inherit", opacity: k === "" ? 0 : 1,
          }}>{k}</button>
      ))}
    </div>
  );
}

// ─── PinModal ─────────────────────────────────────────────────────────────────
function PinModal({ icon, title, subtitle, savedPin, color, onSuccess, onCancel, t }) {
  const isNew = !savedPin;
  const [step, setStep] = useState(isNew ? "create" : "enter");
  const [digits, setDigits] = useState([]);
  const [first, setFirst] = useState(null);
  const [createdPin, setCreatedPin] = useState(null);
  const [error, setError] = useState("");
  const [shake, setShake] = useState(false);

  function doShake(msg) {
    setError(msg); setShake(true);
    setTimeout(() => { setShake(false); setDigits([]); setError(""); }, 700);
  }

  function press(d) {
    if (shake || step === "show") return;
    const len = isNew ? 4 : savedPin.length;
    if (digits.length >= len) return;
    const next = [...digits, d];
    setDigits(next);
    if (next.length === len) {
      const code = next.join("");
      setTimeout(() => {
        if (!isNew) {
          code === savedPin ? onSuccess(null) : doShake(t.wrong);
        } else if (step === "create") {
          setFirst(code); setDigits([]); setStep("confirm");
        } else {
          if (code === first) { setCreatedPin(code); setStep("show"); }
          else { doShake(t.mismatch); setStep("create"); setFirst(null); }
        }
      }, 160);
    }
  }

  function del() { if (!shake && step !== "show") { setDigits(d => d.slice(0, -1)); setError(""); } }

  const len = isNew ? 4 : (savedPin ? savedPin.length : 4);
  const ttl = step === "enter" ? title : step === "create" ? t.createPin : step === "confirm" ? t.confirmPin : "✅ PIN Creado";
  const sub = step === "enter" ? subtitle : step === "create" ? t.pinSub1 : step === "confirm" ? t.pinSub2 : t.pinShowSub;

  if (step === "show" && createdPin) {
    return (
      <div style={{ position: "fixed", inset: 0, background: "#000e", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 400, padding: 16 }}>
        <div style={{
          background: "#0f0f1a", border: `1px solid ${color}55`, borderRadius: 24,
          padding: "32px 24px", maxWidth: 310, width: "100%", textAlign: "center",
          boxShadow: `0 0 50px ${color}20`, animation: "pop .25s",
        }}>
          <style>{`@keyframes pop{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}`}</style>
          <div style={{ fontSize: 32, marginBottom: 10 }}>🔑</div>
          <div style={{ fontWeight: 800, fontSize: 18, marginBottom: 6, color: "#f0f0f0" }}>Tu PIN de Admin</div>
          <div style={{ fontSize: 11, color: "#666", marginBottom: 20 }}>{t.pinShowSub}</div>
          <div style={{ background: `${color}18`, border: `2px solid ${color}66`, borderRadius: 16, padding: "18px 0", marginBottom: 20 }}>
            <div style={{ fontSize: 48, fontWeight: 900, color, letterSpacing: 16 }}>{createdPin}</div>
          </div>
          <div style={{ fontSize: 11, color: "#f87171", marginBottom: 24, lineHeight: 1.6 }}>
            ⚠️ {t.pinShowWarning}
          </div>
          <button onClick={() => onSuccess(createdPin)} style={{
            width: "100%", padding: 14, borderRadius: 14, border: "none",
            background: color, color: "#000", fontSize: 14, fontWeight: 800,
            cursor: "pointer", fontFamily: "inherit",
          }}>{t.pinShowConfirm}</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ position: "fixed", inset: 0, background: "#000e", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 400, padding: 16 }}>
      <div style={{
        background: "#0f0f1a", border: `1px solid ${color}55`, borderRadius: 24,
        padding: "28px 22px", maxWidth: 310, width: "100%", textAlign: "center",
        boxShadow: `0 0 50px ${color}20`,
        animation: shake ? "shk .6s" : "pop .25s",
      }}>
        <style>{`
          @keyframes shk{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
          @keyframes pop{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
        `}</style>
        <div style={{ fontSize: 28, marginBottom: 6 }}>{icon}</div>
        <div style={{ fontWeight: 800, fontSize: 18, marginBottom: 4, color: "#f0f0f0" }}>{ttl}</div>
        <div style={{ fontSize: 11, color: "#666", marginBottom: 18 }}>{sub}</div>
        <PinDots total={len} filled={digits.length} color={color} />
        {error && <div style={{ fontSize: 11, color: "#f87171", marginBottom: 10 }}>{error}</div>}
        <Numpad onPress={press} onDel={del} />
        {onCancel && (
          <button onClick={onCancel} style={{ background: "none", border: "none", color: "#555", fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>{t.cancel}</button>
        )}
      </div>
    </div>
  );
}

// ─── PointsPanel ─────────────────────────────────────────────────────────────
function PointsPanel({ member, color, groupId, onAdd, onClose, t }) {
  const [amt, setAmt] = useState("1");
  const [flash, setFlash] = useState(null);

  function handle(sign) {
    const n = parseInt(amt, 10);
    if (!n || n <= 0) return;
    onAdd(groupId, member.id, sign * n);
    setFlash(sign); setTimeout(() => setFlash(null), 350);
  }

  return (
    <div style={{ position: "fixed", inset: 0, background: "#000c", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 300, padding: 16 }}>
      <div style={{
        background: "#0f0f1a", border: `1px solid ${color}55`, borderRadius: 24,
        padding: "26px 22px", maxWidth: 360, width: "100%",
        boxShadow: `0 0 50px ${color}20`,
        animation: "slideUp .3s cubic-bezier(.4,0,.2,1)",
      }}>
        <style>{`@keyframes slideUp{from{transform:translateY(36px);opacity:0}to{transform:translateY(0);opacity:1}}`}</style>
        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <div style={{ fontSize: 11, letterSpacing: 2, color: "#555", marginBottom: 4 }}>{t.yourPoints}</div>
          <div style={{ fontSize: 56, fontWeight: 900, color, letterSpacing: -3, lineHeight: 1 }}>{member.points}</div>
          <div style={{ fontSize: 14, fontWeight: 700, color: "#ccc", marginTop: 6 }}>{member.name}</div>
        </div>
        <div style={{ display: "flex", alignItems: "stretch", gap: 8, marginBottom: 14 }}>
          <button onClick={() => handle(-1)} style={{
            width: 64, height: 64, borderRadius: 14, flexShrink: 0,
            border: `2px solid ${flash === -1 ? "#f87171" : "#2a1a1a"}`,
            background: flash === -1 ? "#f8717120" : "#1e1818",
            color: "#f87171", fontSize: 28, fontWeight: 900,
            cursor: "pointer", fontFamily: "inherit",
            transform: flash === -1 ? "scale(1.07)" : "scale(1)", transition: "all .15s",
          }}>−</button>
          <input
            type="number" min="1" value={amt}
            onChange={e => setAmt(e.target.value)}
            style={{
              flex: 1, textAlign: "center", background: "#141428",
              border: `2px solid ${color}55`, borderRadius: 14,
              color, fontSize: 24, fontWeight: 900, height: 64,
              fontFamily: "inherit", outline: "none", padding: "0 8px",
              minWidth: 0, boxSizing: "border-box",
              WebkitAppearance: "none", MozAppearance: "textfield",
            }}
          />
          <button onClick={() => handle(1)} style={{
            width: 64, height: 64, borderRadius: 14, flexShrink: 0,
            border: `2px solid ${flash === 1 ? color : color + "44"}`,
            background: flash === 1 ? color + "30" : color + "18",
            color, fontSize: 28, fontWeight: 900,
            cursor: "pointer", fontFamily: "inherit",
            transform: flash === 1 ? "scale(1.07)" : "scale(1)", transition: "all .15s",
          }}>+</button>
        </div>
        <button onClick={onClose} style={{
          width: "100%", padding: 13, borderRadius: 14, border: "1px solid #2a2a3a",
          background: "none", color: "#555", fontSize: 13, fontWeight: 600,
          cursor: "pointer", fontFamily: "inherit",
        }}>{t.done}</button>
      </div>
    </div>
  );
}

// ─── EditName ─────────────────────────────────────────────────────────────────
function EditName({ value, color, onChange }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(value);
  function commit() { if (val.trim()) onChange(val.trim()); else setVal(value); setEditing(false); }
  if (editing) return (
    <input value={val} autoFocus onChange={e => setVal(e.target.value)}
      onBlur={commit}
      onKeyDown={e => { if (e.key === "Enter") commit(); if (e.key === "Escape") { setVal(value); setEditing(false); } }}
      style={{ background: "transparent", border: "none", borderBottom: `2px solid ${color}`, color, fontWeight: 800, fontSize: 15, fontFamily: "inherit", outline: "none", width: 140, padding: "2px 0" }}
    />
  );
  return (
    <span onClick={e => { e.stopPropagation(); setEditing(true); setVal(value); }}
      style={{ fontWeight: 800, fontSize: 15, color, cursor: "text", borderBottom: `1px dashed ${color}55`, paddingBottom: 1 }}>
      {value}
    </span>
  );
}

// ─── EditRow ──────────────────────────────────────────────────────────────────
function EditRow({ initial, color, onSave, onCancel }) {
  const [val, setVal] = useState(initial);
  return (
    <>
      <input value={val} autoFocus onChange={e => setVal(e.target.value)}
        onKeyDown={e => { if (e.key === "Enter") onSave(val); if (e.key === "Escape") onCancel(); }}
        style={{ flex: 1, background: "#141428", border: `1px solid ${color}44`, borderRadius: 8, color: "#f0f0f0", fontSize: 12, fontFamily: "inherit", outline: "none", padding: "6px 10px" }}
      />
      <button onClick={() => onSave(val)} style={smBtn(color + "22", color)}>✓</button>
      <button onClick={onCancel} style={smBtn("#1a1a2e", "#666")}>✕</button>
    </>
  );
}

// ─── Medal ────────────────────────────────────────────────────────────────────
function Medal({ i }) {
  if (i === 0) return <span style={{ fontSize: 18 }}>🥇</span>;
  if (i === 1) return <span style={{ fontSize: 18 }}>🥈</span>;
  if (i === 2) return <span style={{ fontSize: 18 }}>🥉</span>;
  return <span style={{ fontSize: 12, color: "#444", fontWeight: 700, minWidth: 22, textAlign: "center", display: "inline-block" }}>#{i + 1}</span>;
}

const smBtn = (bg, color) => ({
  background: bg, color, border: "none", borderRadius: 8,
  padding: "6px 9px", fontSize: 12, fontWeight: 700,
  cursor: "pointer", fontFamily: "inherit", flexShrink: 0,
});

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [lang, setLang]           = useState(() => sto.get("sc_lang", "es"));
  const [groups, setGroups]       = useState(() => sto.get("sc_groups", INIT));
  const [judgePin, setJudgePin]   = useState(() => sto.get("sc_judge", null));
  const t = LANG[lang];

  const [tab, setTab]             = useState(0);
  const [manageOpen, setManageOpen] = useState(false);
  const [openGroup, setOpenGroup] = useState(null);
  const [openManage, setOpenManage] = useState(null);
  const [editingId, setEditingId] = useState(null);
  const [addInput, setAddInput]   = useState("");

  // Modals
  const [pendingMember, setPendingMember]   = useState(null); // waiting for judge PIN to edit points
  const [activeUser, setActiveUser]         = useState(null); // points panel open
  const [showManagePin, setShowManagePin]   = useState(false);
  const [showResetPin, setShowResetPin]     = useState(false);
  const [showResetConfirm, setShowResetConfirm] = useState(false);

  useEffect(() => sto.set("sc_lang", lang),     [lang]);
  useEffect(() => sto.set("sc_groups", groups), [groups]);
  useEffect(() => sto.set("sc_judge", judgePin),[judgePin]);

  function upd(fn) { setGroups(prev => fn(prev)); }

  // Tap a member name → ask judge PIN first
  function tapMember(member, group) {
    setPendingMember({ member, gColor: group.color, gId: group.id });
  }

  function onJudgePinOk(newPin) {
    if (newPin) { setJudgePin(newPin); sto.set("sc_judge", newPin); }
    const { member, gColor, gId } = pendingMember;
    setPendingMember(null);
    setActiveUser({ member, gColor, gId });
  }

  function onManagePinOk(newPin) {
    if (newPin) { setJudgePin(newPin); sto.set("sc_judge", newPin); }
    setShowManagePin(false);
    setManageOpen(true);
    setTab(2);
  }

  function onResetPinOk(newPin) {
    if (newPin) { setJudgePin(newPin); sto.set("sc_judge", newPin); }
    setShowResetPin(false);
    setShowResetConfirm(true);
  }

  function addPoints(gId, mId, delta) {
    upd(gs => gs.map(g => g.id === gId
      ? { ...g, members: g.members.map(m => m.id === mId ? { ...m, points: Math.max(0, m.points + delta) } : m) } : g));
    setActiveUser(au => au ? { ...au, member: { ...au.member, points: Math.max(0, au.member.points + delta) } } : au);
  }

  function renameGroup(gId, name) {
    upd(gs => gs.map(g => g.id === gId ? { ...g, name } : g));
  }

  function renameMember(gId, mId, name) {
    if (!name.trim()) return;
    upd(gs => gs.map(g => g.id === gId
      ? { ...g, members: g.members.map(m => m.id === mId ? { ...m, name: name.trim() } : m) } : g));
    setEditingId(null);
  }

  function addMember(gId, name) {
    if (!name.trim()) return;
    upd(gs => gs.map(g => g.id === gId
      ? { ...g, members: [...g.members, { id: Date.now(), name: name.trim(), points: 0 }] } : g));
    setAddInput("");
  }

  function setPointsDirect(gId, mId, val) {
    const n = parseInt(val, 10);
    if (isNaN(n) || n < 0) return;
    upd(gs => gs.map(g => g.id === gId
      ? { ...g, members: g.members.map(m => m.id === mId ? { ...m, points: n } : m) } : g));
  }

  function handleTabClick(i) {
    setManageOpen(false);
    if (i === 2) { setShowManagePin(true); }
    else { setTab(i); }
  }

  function doReset() {
    setGroups(INIT);
    setShowResetConfirm(false);
    setTab(0);
    setManageOpen(false);
  }

  const ranked = sortGroups(groups);
  const players = allPlayers(groups);

  return (
    <div style={{ minHeight: "100vh", background: "#08080f", color: "#f0f0f0", fontFamily: "'Syne','Barlow',system-ui,sans-serif", paddingBottom: 80 }}>
      <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />

      {/* Header */}
      <div style={{ background: "linear-gradient(160deg,#0f0f1e,#14141f)", borderBottom: "1px solid #1e1e2e", padding: "20px 18px 14px", position: "sticky", top: 0, zIndex: 50 }}>
        <div style={{ maxWidth: 580, margin: "0 auto" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
            <div>
              <div style={{ fontSize: 10, letterSpacing: 4, color: "#444", textTransform: "uppercase" }}>{t.sub}</div>
              <div style={{ fontSize: 22, fontWeight: 900, letterSpacing: -1, lineHeight: 1.1 }}>{t.title}</div>
            </div>
            <div style={{ display: "flex", gap: 7 }}>
              <button onClick={() => setLang(l => l === "es" ? "pt" : "es")} style={{
                background: "#1a1a2e", border: "1px solid #2a2a3e", color: "#888",
                borderRadius: 8, padding: "5px 10px", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
              }}>{lang === "es" ? "PT" : "ES"}</button>
              <button onClick={() => setShowResetPin(true)} style={{
                background: "none", border: "1px solid #2a2a3e", color: "#555",
                borderRadius: 8, padding: "5px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit",
              }}>{t.reset}</button>
            </div>
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            {t.tabs.map((label, i) => (
              <button key={i} onClick={() => handleTabClick(i)} style={{
                flex: 1, padding: "8px 4px", borderRadius: 10, border: "none", cursor: "pointer",
                fontSize: 11, fontWeight: 700, fontFamily: "inherit",
                background: tab === i ? "#f0f0f0" : "#141428",
                color: tab === i ? "#08080f" : "#555",
                transition: "all .2s",
              }}>{label}</button>
            ))}
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{ maxWidth: 580, margin: "0 auto", padding: "18px 16px" }}>

        {/* GROUPS */}
        {tab === 0 && (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <div style={{ fontSize: 10, letterSpacing: 3, color: "#444", marginBottom: 2 }}>{t.topGroups}</div>
            {ranked.map((g, i) => {
              const tot = groupTotal(g);
              const maxTot = groupTotal(ranked[0]) || 1;
              const isOpen = openGroup === g.id;
              return (
                <div key={g.id} style={{
                  background: "#0f0f1a", borderRadius: 16,
                  border: `1px solid ${i === 0 ? g.color + "44" : "#1a1a2a"}`,
                  overflow: "hidden",
                  boxShadow: i === 0 ? `0 0 24px ${g.color}18` : "none",
                }}>
                  <div onClick={() => setOpenGroup(isOpen ? null : g.id)}
                    style={{ padding: "14px 18px", cursor: "pointer", display: "flex", alignItems: "center", gap: 10 }}>
                    <Medal i={i} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 7 }}>
                        <span style={{ fontWeight: 800, fontSize: 15, color: g.color }}>{g.emoji} {g.name}</span>
                        <span style={{ fontWeight: 900, fontSize: 20, color: g.color, letterSpacing: -1 }}>{tot}</span>
                      </div>
                      <div style={{ height: 3, background: "#1e1e2e", borderRadius: 99, overflow: "hidden" }}>
                        <div style={{ height: "100%", background: g.color, borderRadius: 99, width: `${(tot / maxTot) * 100}%`, transition: "width .5s" }} />
                      </div>
                    </div>
                    <span style={{ color: "#333", fontSize: 11 }}>{isOpen ? "▲" : "▼"}</span>
                  </div>
                  {isOpen && (
                    <div style={{ borderTop: "1px solid #1a1a2a", padding: "10px 18px 14px" }}>
                      {g.members.map(m => (
                        <div key={m.id}
                          style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 8px", borderBottom: "1px solid #141428" }}>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontSize: 13, fontWeight: 700 }}>{m.name}</div>
                          </div>
                          <div style={{ fontWeight: 900, fontSize: 20, color: g.color, letterSpacing: -1 }}>{m.points}</div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* INDIVIDUAL */}
        {tab === 1 && (
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <div style={{ fontSize: 10, letterSpacing: 3, color: "#444", marginBottom: 4 }}>{t.topPlayers}</div>
            {players.map((m, i) => (
              <div key={m.id} style={{
                background: "#0f0f1a", border: `1px solid ${i === 0 ? m.gColor + "44" : "#1a1a2a"}`,
                borderRadius: 14, padding: "13px 16px", display: "flex", alignItems: "center", gap: 10,
                boxShadow: i === 0 ? `0 0 20px ${m.gColor}15` : "none",
              }}>
                <Medal i={i} />
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 700, fontSize: 14 }}>{m.name}</div>
                  <div style={{ fontSize: 10, color: m.gColor, opacity: .7, marginTop: 1 }}>{m.gEmoji} {m.gName}</div>
                </div>
                <div style={{ fontWeight: 900, fontSize: 22, color: m.gColor, letterSpacing: -1 }}>{m.points}</div>
              </div>
            ))}
          </div>
        )}

        {/* MANAGE */}
        {tab === 2 && manageOpen && (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <div style={{ fontSize: 10, letterSpacing: 3, color: "#444", marginBottom: 2 }}>{t.manageTitle}</div>
            {groups.map(g => {
              const isOpen = openManage === g.id;
              return (
                <div key={g.id} style={{ background: "#0f0f1a", borderRadius: 16, border: "1px solid #1a1a2a", overflow: "hidden" }}>
                  <div onClick={() => setOpenManage(isOpen ? null : g.id)}
                    style={{ padding: "13px 16px", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <div onClick={e => e.stopPropagation()}>
                      <EditName value={g.name} color={g.color} onChange={n => renameGroup(g.id, n)} />
                    </div>
                    <span style={{ color: "#333", fontSize: 11 }}>{isOpen ? "▲" : "▼"}</span>
                  </div>
                  {isOpen && (
                    <div style={{ borderTop: "1px solid #141428", padding: "10px 16px 14px" }}>
                      {g.members.map(m => (
                        <div key={m.id} style={{ display: "flex", alignItems: "center", gap: 7, padding: "7px 0", borderBottom: "1px solid #141428" }}>
                          {editingId === m.id ? (
                            <EditRow initial={m.name} color={g.color}
                              onSave={n => renameMember(g.id, m.id, n)}
                              onCancel={() => setEditingId(null)}
                            />
                          ) : (
                            <>
                              <div style={{ flex: 1 }}>
                                <div style={{ fontSize: 13, fontWeight: 600 }}>{m.name}</div>
                              </div>
                              <input type="number" min="0" value={m.points}
                                onChange={e => setPointsDirect(g.id, m.id, e.target.value)}
                                style={{ width: 60, textAlign: "center", background: "#141428", border: `1px solid ${g.color}33`, borderRadius: 8, color: g.color, fontWeight: 800, fontSize: 14, fontFamily: "inherit", outline: "none", padding: "5px 4px" }}
                              />
                              <button onClick={() => { setEditingId(m.id); }} style={smBtn("#1a1a2e", "#888")}>✏️</button>
                              <button onClick={() => { setPendingMember({ member: m, gColor: g.color, gId: g.id }); }} style={smBtn(g.color + "22", g.color)}>±</button>
                            </>
                          )}
                        </div>
                      ))}
                      <div style={{ display: "flex", gap: 7, marginTop: 10 }}>
                        <input placeholder={t.addMember} value={addInput}
                          onChange={e => setAddInput(e.target.value)}
                          onKeyDown={e => e.key === "Enter" && addMember(g.id, addInput)}
                          style={{ flex: 1, background: "#141428", border: "1px solid #2a2a3a", borderRadius: 10, color: "#f0f0f0", fontSize: 12, fontFamily: "inherit", outline: "none", padding: "8px 12px" }}
                        />
                        <button onClick={() => addMember(g.id, addInput)}
                          style={{ ...smBtn(g.color + "22", g.color), padding: "8px 14px", fontWeight: 700, fontSize: 12 }}>{t.add}</button>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* ── Modals ── */}

      {/* Judge PIN to edit a member's points */}
      {pendingMember && (
        <PinModal
          icon="⚖️" color={pendingMember.gColor}
          savedPin={judgePin}
          title={judgePin ? t.enterPin : t.createPin}
          subtitle={judgePin ? t.pinSub3 : t.pinSub1}
          onSuccess={onJudgePinOk}
          onCancel={() => setPendingMember(null)}
          t={t}
        />
      )}

      {/* Points panel */}
      {activeUser && (
        <PointsPanel
          member={activeUser.member} color={activeUser.gColor} groupId={activeUser.gId}
          onAdd={addPoints} onClose={() => setActiveUser(null)} t={t}
        />
      )}

      {/* Manage PIN */}
      {showManagePin && (
        <PinModal
          icon="🛡️" color="#38bdf8"
          savedPin={judgePin}
          title={judgePin ? t.managePinTitle : t.createPin}
          subtitle={judgePin ? t.managePinSub : t.pinSub1}
          onSuccess={onManagePinOk}
          onCancel={() => setShowManagePin(false)}
          t={t}
        />
      )}

      {/* Reset PIN */}
      {showResetPin && (
        <PinModal
          icon="👑" color="#e879f9"
          savedPin={judgePin}
          title={judgePin ? t.resetTitle : t.createPin}
          subtitle={judgePin ? t.resetSub : t.pinSub1}
          onSuccess={onResetPinOk}
          onCancel={() => setShowResetPin(false)}
          t={t}
        />
      )}

      {/* Reset confirm */}
      {showResetConfirm && (
        <div style={{ position: "fixed", inset: 0, background: "#000d", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 400, padding: 16 }}>
          <div style={{ background: "#0f0f1a", border: "1px solid #f8717144", borderRadius: 22, padding: 26, maxWidth: 300, width: "100%", textAlign: "center" }}>
            <div style={{ fontSize: 34, marginBottom: 10 }}>⚠️</div>
            <div style={{ fontWeight: 800, fontSize: 17, marginBottom: 6 }}>{t.resetConfirm}</div>
            <div style={{ fontSize: 12, color: "#666", marginBottom: 22 }}>{t.resetConfirmSub}</div>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={() => setShowResetConfirm(false)} style={{ flex: 1, padding: 12, borderRadius: 12, border: "1px solid #2a2a3a", background: "none", color: "#888", cursor: "pointer", fontFamily: "inherit", fontWeight: 600, fontSize: 13 }}>{t.cancel}</button>
              <button onClick={doReset} style={{ flex: 1, padding: 12, borderRadius: 12, border: "none", background: "#f87171", color: "#fff", cursor: "pointer", fontFamily: "inherit", fontWeight: 800, fontSize: 13 }}>{t.yesReset}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

  ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
