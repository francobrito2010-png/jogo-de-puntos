<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Juego de Puntos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#08080f;color:#f0f0f0;font-family:'Syne',system-ui,sans-serif;min-height:100vh;padding-bottom:80px}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
button{font-family:'Syne',system-ui,sans-serif;cursor:pointer}
input{font-family:'Syne',system-ui,sans-serif}
.header{background:linear-gradient(160deg,#0f0f1e,#14141f);border-bottom:1px solid #1e1e2e;padding:20px 18px 14px;position:sticky;top:0;z-index:50}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;max-width:580px;margin-left:auto;margin-right:auto}
.app-sub{font-size:10px;letter-spacing:4px;color:#444;text-transform:uppercase}
.app-title{font-size:22px;font-weight:900;letter-spacing:-1px;line-height:1.1}
.header-btns{display:flex;gap:7px}
.lang-btn{background:#1a1a2e;border:1px solid #2a2a3e;color:#888;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700}
.reset-btn{background:none;border:1px solid #2a2a3e;color:#555;border-radius:8px;padding:5px 10px;font-size:11px}
.tabs{display:flex;gap:6px;max-width:580px;margin:0 auto}
.tab{flex:1;padding:8px 4px;border-radius:10px;border:none;font-size:11px;font-weight:700;letter-spacing:.3px;transition:all .2s}
.tab.active{background:#f0f0f0;color:#08080f}
.tab.inactive{background:#141428;color:#555}
.content{max-width:580px;margin:0 auto;padding:18px 16px}
.section-label{font-size:10px;letter-spacing:3px;color:#444;margin-bottom:8px}
.group-card{background:#0f0f1a;border-radius:16px;overflow:hidden;margin-bottom:10px;transition:box-shadow .3s}
.group-header{padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:10px}
.group-name{font-weight:800;font-size:15px}
.group-score{font-weight:900;font-size:20px;letter-spacing:-1px}
.bar-bg{height:3px;background:#1e1e2e;border-radius:99px;overflow:hidden;margin-top:7px}
.bar-fill{height:100%;border-radius:99px;transition:width .5s}
.group-members{border-top:1px solid #1a1a2a;padding:10px 18px 14px}
.member-row{display:flex;align-items:center;gap:8px;padding:10px 8px;border-bottom:1px solid #141428;border-radius:10px;transition:background .15s}
.member-name{font-size:13px;font-weight:700}
.member-pts{font-weight:900;font-size:20px;letter-spacing:-1px}
.player-card{background:#0f0f1a;border-radius:14px;padding:13px 16px;display:flex;align-items:center;gap:10px;margin-bottom:8px}
.player-name{font-weight:700;font-size:14px}
.player-group{font-size:10px;opacity:.7;margin-top:1px}
.player-pts{font-weight:900;font-size:22px;letter-spacing:-1px}
.medal{font-size:18px;flex-shrink:0}
.rank{font-size:12px;color:#444;font-weight:700;min-width:22px;text-align:center;flex-shrink:0}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.87);display:flex;align-items:center;justify-content:center;z-index:400;padding:16px}
.overlay.bottom{align-items:flex-end}
.modal{background:#0f0f1a;border-radius:24px;padding:28px 22px;max-width:310px;width:100%;text-align:center}
.modal-bottom{background:#0f0f1a;border-radius:24px;padding:26px 22px;max-width:360px;width:100%}
.modal-icon{font-size:28px;margin-bottom:6px}
.modal-title{font-weight:800;font-size:18px;margin-bottom:4px;color:#f0f0f0}
.modal-sub{font-size:11px;color:#666;margin-bottom:18px;min-height:16px}
.pin-dots{display:flex;gap:10px;justify-content:center;margin-bottom:18px}
.pin-dot{width:13px;height:13px;border-radius:50%;transition:all .15s}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.numpad-btn{padding:15px 0;border-radius:12px;border:1px solid #2a2a3a;font-size:19px;font-weight:700;color:#f0f0f0;background:#1a1a2a}
.numpad-btn.del{color:#f87171;background:#1e1e2e}
.numpad-btn.empty{background:transparent;border:none;cursor:default;opacity:0}
.cancel-btn{background:none;border:none;color:#555;font-size:12px;padding:4px 8px}
.pts-label{font-size:11px;letter-spacing:2px;color:#555;margin-bottom:4px}
.pts-big{font-size:56px;font-weight:900;letter-spacing:-3px;line-height:1}
.pts-name{font-size:14px;font-weight:700;color:#ccc;margin-top:6px}
.pts-controls{display:flex;align-items:stretch;gap:8px;margin-bottom:14px}
.pts-btn{width:64px;height:64px;border-radius:14px;font-size:28px;font-weight:900;flex-shrink:0;transition:all .15s}
.pts-input{flex:1;text-align:center;background:#141428;border-radius:14px;font-size:24px;font-weight:900;height:64px;outline:none;padding:0 8px;min-width:0}
.done-btn{width:100%;padding:13px;border-radius:14px;border:1px solid #2a2a3a;background:none;color:#555;font-size:13px;font-weight:600}
.manage-card{background:#0f0f1a;border-radius:16px;border:1px solid #1a1a2a;overflow:hidden;margin-bottom:10px}
.manage-header{padding:13px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.manage-body{border-top:1px solid #141428;padding:10px 16px 14px}
.manage-row{display:flex;align-items:center;gap:7px;padding:7px 0;border-bottom:1px solid #141428}
.sm-btn{border:none;border-radius:8px;padding:6px 9px;font-size:12px;font-weight:700;flex-shrink:0}
.pts-direct{width:60px;text-align:center;background:#141428;border-radius:8px;font-weight:800;font-size:14px;outline:none;padding:5px 4px}
.add-row{display:flex;gap:7px;margin-top:10px}
.add-input{flex:1;background:#141428;border:1px solid #2a2a3a;border-radius:10px;color:#f0f0f0;font-size:12px;outline:none;padding:8px 12px}
.add-btn{border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700}
.chevron{color:#333;font-size:11px}
.pin-show-box{border-radius:16px;padding:18px 0;margin-bottom:20px}
.pin-show-num{font-size:48px;font-weight:900;letter-spacing:16px}
.pin-warn{font-size:11px;color:#f87171;margin-bottom:24px;line-height:1.6}
.confirm-ok{width:100%;padding:14px;border-radius:14px;border:none;font-size:14px;font-weight:800;color:#000}
.reset-confirm-modal{background:#0f0f1a;border:1px solid rgba(248,113,113,.27);border-radius:22px;padding:26px;max-width:300px;width:100%;text-align:center}
.reset-icon{font-size:34px;margin-bottom:10px}
.reset-title{font-weight:800;font-size:17px;margin-bottom:6px}
.reset-sub{font-size:12px;color:#666;margin-bottom:22px}
.reset-btns{display:flex;gap:8px}
.reset-cancel{flex:1;padding:12px;border-radius:12px;border:1px solid #2a2a3a;background:none;color:#888;font-size:13px;font-weight:600}
.reset-ok{flex:1;padding:12px;border-radius:12px;border:none;background:#f87171;color:#fff;font-size:13px;font-weight:800}
@keyframes shk{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes pop{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{transform:translateY(36px);opacity:0}to{transform:translateY(0);opacity:1}}
.anim-pop{animation:pop .25s}
.anim-shake{animation:shk .6s}
.anim-slide{animation:slideUp .3s cubic-bezier(.4,0,.2,1)}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="app-sub" id="appSub">Scouts</div>
      <div class="app-title" id="appTitle">JUEGO DE PUNTOS</div>
    </div>
    <div class="header-btns">
      <button class="lang-btn" onclick="toggleLang()" id="langBtn">PT</button>
      <button class="reset-btn" onclick="showResetPin()">👑 Reset</button>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
</div>

<div class="content" id="content"></div>

<!-- PIN Modal -->
<div class="overlay" id="pinOverlay" style="display:none">
  <div class="modal anim-pop" id="pinModal">
    <div class="modal-icon" id="pinIcon"></div>
    <div class="modal-title" id="pinTitle"></div>
    <div class="modal-sub" id="pinSub"></div>
    <div class="pin-dots" id="pinDots"></div>
    <div id="pinError" style="font-size:11px;color:#f87171;margin-bottom:10px;min-height:14px"></div>
    <div class="numpad" id="numpad"></div>
    <button class="cancel-btn" id="pinCancelBtn" onclick="closePinModal()"></button>
  </div>
</div>

<!-- PIN Show Modal -->
<div class="overlay" id="pinShowOverlay" style="display:none">
  <div class="modal anim-pop" id="pinShowModal">
    <div style="font-size:32px;margin-bottom:10px">🔑</div>
    <div class="modal-title">Tu PIN de Admin</div>
    <div class="modal-sub" id="pinShowSub"></div>
    <div class="pin-show-box" id="pinShowBox">
      <div class="pin-show-num" id="pinShowNum"></div>
    </div>
    <div class="pin-warn" id="pinShowWarn"></div>
    <button class="confirm-ok" id="pinShowConfirmBtn" onclick="confirmPinShown()"></button>
  </div>
</div>

<!-- Points Panel -->
<div class="overlay bottom" id="ptsOverlay" style="display:none">
  <div class="modal-bottom anim-slide" id="ptsModal">
    <div style="text-align:center;margin-bottom:24px">
      <div class="pts-label" id="ptsLabel">PUNTOS</div>
      <div class="pts-big" id="ptsBig"></div>
      <div class="pts-name" id="ptsName"></div>
    </div>
    <div class="pts-controls">
      <button class="pts-btn" id="ptsMinusBtn" onclick="handlePts(-1)">−</button>
      <input class="pts-input" type="number" min="1" id="ptsAmt" value="1"/>
      <button class="pts-btn" id="ptsPlusBtn" onclick="handlePts(1)">+</button>
    </div>
    <button class="done-btn" id="ptsDoneBtn" onclick="closePts()"></button>
  </div>
</div>

<!-- Reset Confirm -->
<div class="overlay" id="resetOverlay" style="display:none">
  <div class="reset-confirm-modal anim-pop">
    <div class="reset-icon">⚠️</div>
    <div class="reset-title" id="resetTitle"></div>
    <div class="reset-sub" id="resetSub"></div>
    <div class="reset-btns">
      <button class="reset-cancel" id="resetCancelBtn" onclick="closeReset()"></button>
      <button class="reset-ok" id="resetOkBtn" onclick="doReset()"></button>
    </div>
  </div>
</div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────────
const INIT = [
  {id:1,name:"Patrulla Alfa",color:"#f97316",emoji:"🔥",members:[
    {id:101,name:"Carlos M.",points:0},{id:102,name:"Sofía R.",points:0},{id:103,name:"Diego P.",points:0}]},
  {id:2,name:"Patrulla Beta",color:"#22d3ee",emoji:"⚡",members:[
    {id:201,name:"Ana L.",points:0},{id:202,name:"Marco T.",points:0},{id:203,name:"Valeria S.",points:0}]},
  {id:3,name:"Patrulla Gamma",color:"#a78bfa",emoji:"🚀",members:[
    {id:301,name:"Luis H.",points:0},{id:302,name:"Camila N.",points:0},{id:303,name:"Rodrigo V.",points:0}]},
  {id:4,name:"Patrulla Delta",color:"#fbbf24",emoji:"💎",members:[
    {id:401,name:"Isabella C.",points:0},{id:402,name:"Tomás B.",points:0},{id:403,name:"Natalia F.",points:0}]},
  {id:5,name:"Patrulla Omega",color:"#34d399",emoji:"🏆",members:[
    {id:501,name:"Pablo E.",points:0},{id:502,name:"Lucía M.",points:0},{id:503,name:"Andrés K.",points:0}]},
];

const LANG = {
  es:{title:"JUEGO DE PUNTOS",sub:"Scouts",tabs:["Grupos","Individual","🔒 Gestionar"],
    topGroups:"RANKING DE GRUPOS",topPlayers:"RANKING INDIVIDUAL",manageTitle:"GESTIONAR",
    yourPoints:"PUNTOS",done:"Listo ✓",cancel:"Cancelar",
    createPin:"Crear PIN de Juez",confirmPin:"Confirmar PIN",enterPin:"Acceso de Juez",
    pinSub1:"Primera vez — crea un PIN de 4 dígitos",pinSub2:"Repite el PIN para confirmar",
    pinSub3:"Ingresa el PIN de juez",
    pinShowSub:"Anota este PIN, lo necesitarás siempre.",
    pinShowWarn:"Guarda este número. No podrás recuperarlo si lo olvidas.",
    pinShowConfirm:"Ya lo anoté, continuar ✓",
    mismatch:"Los PINs no coinciden.",wrong:"PIN incorrecto.",
    managePinTitle:"Acceso de Juez",managePinSub:"Solo el juez puede gestionar",
    resetTitle:"Acceso Admin",resetSub:"PIN de administrador",
    resetConfirm:"¿Reiniciar TODO?",resetConfirmSub:"Se borran todos los puntos.",
    yesReset:"Sí, reiniciar",addMember:"Nuevo integrante...",add:"Agregar"},
  pt:{title:"JOGO DE PONTOS",sub:"Escoteiros",tabs:["Grupos","Individual","🔒 Gerenciar"],
    topGroups:"RANKING DE GRUPOS",topPlayers:"RANKING INDIVIDUAL",manageTitle:"GERENCIAR",
    yourPoints:"PONTOS",done:"Pronto ✓",cancel:"Cancelar",
    createPin:"Criar PIN do Juiz",confirmPin:"Confirmar PIN",enterPin:"Acesso do Juiz",
    pinSub1:"Primeira vez — crie um PIN de 4 dígitos",pinSub2:"Repita o PIN para confirmar",
    pinSub3:"Insira o PIN do juiz",
    pinShowSub:"Anote este PIN, você precisará dele sempre.",
    pinShowWarn:"Guarde este número. Não poderá recuperá-lo se esquecer.",
    pinShowConfirm:"Já anotei, continuar ✓",
    mismatch:"Os PINs não coincidem.",wrong:"PIN incorreto.",
    managePinTitle:"Acesso do Juiz",managePinSub:"Só o juiz pode gerenciar",
    resetTitle:"Acesso Admin",resetSub:"PIN de administrador",
    resetConfirm:"Reiniciar TUDO?",resetConfirmSub:"Todos os pontos serão apagados.",
    yesReset:"Sim, reiniciar",addMember:"Novo integrante...",add:"Adicionar"},
};

// ── State ─────────────────────────────────────────────────────────────────────
let lang = sto('sc_lang','es');
let groups = sto('sc_groups', JSON.parse(JSON.stringify(INIT)));
let judgePin = sto('sc_judge', null);
let tab = 0;
let openGroup = null;
let openManage = null;
let editingId = null;
let manageOpen = false;

// PIN state
let pinStep = 'enter'; // create|confirm|enter|show
let pinDigits = [];
let pinFirst = null;
let pinColor = '#f97316';
let pinCallback = null;
let pinIsNew = false;
let pendingMember = null;
let activeUser = null;

function sto(k, def) {
  try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; }
}
function sav(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }

function t() { return LANG[lang]; }
function gt(g) { return g.members.reduce((s,m) => s+m.points, 0); }
function sortedGroups() { return [...groups].sort((a,b) => gt(b)-gt(a)); }
function allPlayers() {
  return groups.flatMap(g => g.members.map(m => ({...m,gName:g.name,gColor:g.color,gEmoji:g.emoji,gId:g.id})))
    .sort((a,b) => b.points-a.points);
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const L = t();
  document.getElementById('appTitle').textContent = L.title;
  document.getElementById('appSub').textContent = L.sub;
  document.getElementById('langBtn').textContent = lang==='es'?'PT':'ES';

  // Tabs
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = L.tabs.map((label,i) =>
    `<button class="tab ${tab===i?'active':'inactive'}" onclick="clickTab(${i})">${label}</button>`
  ).join('');

  // Content
  const el = document.getElementById('content');
  if(tab===0) renderGroups(el, L);
  else if(tab===1) renderPlayers(el, L);
  else if(tab===2 && manageOpen) renderManage(el, L);
  else el.innerHTML = '';
}

function renderGroups(el, L) {
  const ranked = sortedGroups();
  const maxT = gt(ranked[0]) || 1;
  el.innerHTML = `<div class="section-label">${L.topGroups}</div>` +
    ranked.map((g,i) => {
      const tot = gt(g);
      const pct = (tot/maxT*100).toFixed(1);
      const border = i===0 ? `1px solid ${g.color}44` : '1px solid #1a1a2a';
      const shadow = i===0 ? `0 0 24px ${g.color}18` : 'none';
      const open = openGroup===g.id;
      let members = '';
      if(open) {
        members = `<div class="group-members">` +
          g.members.map(m => `
            <div class="member-row" id="mrow-${m.id}">
              <div style="flex:1"><div class="member-name">${m.name}</div></div>
              <div class="member-pts" style="color:${g.color}">${m.points}</div>
            </div>`).join('') + `</div>`;
      }
      return `<div class="group-card" style="border:${border};box-shadow:${shadow}">
        <div class="group-header" onclick="toggleGroup(${g.id})">
          <span style="font-size:${i<3?18:12}px;flex-shrink:0">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1)}</span>
          <div style="flex:1;min-width:0">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span class="group-name" style="color:${g.color}">${g.emoji} ${g.name}</span>
              <span class="group-score" style="color:${g.color}">${tot}</span>
            </div>
            <div class="bar-bg"><div class="bar-fill" style="background:${g.color};width:${pct}%"></div></div>
          </div>
          <span class="chevron">${open?'▲':'▼'}</span>
        </div>${members}</div>`;
    }).join('');
}

function renderPlayers(el, L) {
  const players = allPlayers();
  el.innerHTML = `<div class="section-label">${L.topPlayers}</div>` +
    players.map((m,i) => {
      const border = i===0 ? `1px solid ${m.gColor}44` : '1px solid #1a1a2a';
      const shadow = i===0 ? `0 0 20px ${m.gColor}15` : 'none';
      const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':null;
      const rankEl = medal ? `<span class="medal">${medal}</span>` : `<span class="rank">#${i+1}</span>`;
      return `<div class="player-card" style="border:${border};box-shadow:${shadow}">
        ${rankEl}
        <div style="flex:1">
          <div class="player-name">${m.name}</div>
          <div class="player-group" style="color:${m.gColor}">${m.gEmoji} ${m.gName}</div>
        </div>
        <div class="player-pts" style="color:${m.gColor}">${m.points}</div>
      </div>`;
    }).join('');
}

function renderManage(el, L) {
  el.innerHTML = `<div class="section-label">${L.manageTitle}</div>` +
    groups.map(g => {
      const open = openManage===g.id;
      let body = '';
      if(open) {
        const rows = g.members.map(m => {
          if(editingId===m.id) {
            return `<div class="manage-row">
              <input id="editInput-${m.id}" value="${m.name}" style="flex:1;background:#141428;border:1px solid ${g.color}44;border-radius:8px;color:#f0f0f0;font-size:12px;outline:none;padding:6px 10px"/>
              <button class="sm-btn" style="background:${g.color}22;color:${g.color}" onclick="saveMemberName(${g.id},${m.id})">✓</button>
              <button class="sm-btn" style="background:#1a1a2e;color:#666" onclick="cancelEdit()">✕</button>
            </div>`;
          }
          return `<div class="manage-row">
            <div style="flex:1"><div style="font-size:13px;font-weight:600">${m.name}</div></div>
            <input type="number" min="0" value="${m.points}" class="pts-direct" style="border:1px solid ${g.color}33;color:${g.color}" onchange="setDirect(${g.id},${m.id},this.value)"/>
            <button class="sm-btn" style="background:#1a1a2e;color:#888" onclick="startEdit(${m.id})">✏️</button>
            <button class="sm-btn" style="background:${g.color}22;color:${g.color}" onclick="openPtsFor(${g.id},${m.id})">±</button>
          </div>`;
        }).join('');
        body = `<div class="manage-body">${rows}
          <div class="add-row">
            <input class="add-input" id="addInput-${g.id}" placeholder="${L.addMember}" onkeydown="if(event.key==='Enter')addMember(${g.id})"/>
            <button class="add-btn" style="background:${g.color}22;color:${g.color}" onclick="addMember(${g.id})">${L.add}</button>
          </div></div>`;
      }
      return `<div class="manage-card">
        <div class="manage-header" onclick="toggleManage(${g.id})">
          <span style="font-weight:800;font-size:14px;color:${g.color}">${g.emoji} ${g.name}</span>
          <span class="chevron">${open?'▲':'▼'}</span>
        </div>${body}</div>`;
    }).join('');
}

// ── Navigation ────────────────────────────────────────────────────────────────
function clickTab(i) {
  manageOpen = false;
  if(i===2) { openManagePinModal(); }
  else { tab=i; render(); }
}

function toggleGroup(id) { openGroup = openGroup===id ? null : id; render(); }
function toggleManage(id) { openManage = openManage===id ? null : id; render(); }
function toggleLang() { lang = lang==='es'?'pt':'es'; sav('sc_lang',lang); render(); }

// ── Member editing ────────────────────────────────────────────────────────────
function startEdit(mId) { editingId=mId; render(); setTimeout(()=>{const el=document.getElementById('editInput-'+mId);if(el)el.focus();},50); }
function cancelEdit() { editingId=null; render(); }
function saveMemberName(gId,mId) {
  const el = document.getElementById('editInput-'+mId);
  if(!el||!el.value.trim()) return;
  groups = groups.map(g => g.id===gId ? {...g,members:g.members.map(m => m.id===mId?{...m,name:el.value.trim()}:m)} : g);
  sav('sc_groups',groups); editingId=null; render();
}
function addMember(gId) {
  const el = document.getElementById('addInput-'+gId);
  if(!el||!el.value.trim()) return;
  const nm = {id:Date.now(),name:el.value.trim(),points:0};
  groups = groups.map(g => g.id===gId ? {...g,members:[...g.members,nm]} : g);
  sav('sc_groups',groups); render();
}
function setDirect(gId,mId,val) {
  const n = parseInt(val,10);
  if(isNaN(n)||n<0) return;
  groups = groups.map(g => g.id===gId ? {...g,members:g.members.map(m => m.id===mId?{...m,points:n}:m)} : g);
  sav('sc_groups',groups);
}
function openPtsFor(gId,mId) {
  const g = groups.find(x=>x.id===gId);
  const m = g.members.find(x=>x.id===mId);
  pendingMember = {member:m,gColor:g.color,gId:gId};
  openJudgePin();
}

// ── Points Panel ──────────────────────────────────────────────────────────────
function openPtsPanel(member, color, gId) {
  activeUser = {member, color, gId};
  const L = t();
  document.getElementById('ptsLabel').textContent = L.yourPoints;
  document.getElementById('ptsBig').textContent = member.points;
  document.getElementById('ptsBig').style.color = color;
  document.getElementById('ptsName').textContent = member.name;
  document.getElementById('ptsAmt').value = '1';
  document.getElementById('ptsAmt').style.color = color;
  document.getElementById('ptsAmt').style.border = `2px solid ${color}55`;
  document.getElementById('ptsMinusBtn').style.cssText = `width:64px;height:64px;border-radius:14px;font-size:28px;font-weight:900;flex-shrink:0;border:2px solid #2a1a1a;background:#1e1818;color:#f87171;transition:all .15s`;
  document.getElementById('ptsPlusBtn').style.cssText = `width:64px;height:64px;border-radius:14px;font-size:28px;font-weight:900;flex-shrink:0;border:2px solid ${color}44;background:${color}18;color:${color};transition:all .15s`;
  document.getElementById('ptsDoneBtn').textContent = L.done;
  document.getElementById('ptsOverlay').style.display = 'flex';
}
function handlePts(sign) {
  const amt = parseInt(document.getElementById('ptsAmt').value,10);
  if(!amt||amt<=0||!activeUser) return;
  const delta = sign*amt;
  groups = groups.map(g => g.id===activeUser.gId ? {...g,members:g.members.map(m => m.id===activeUser.member.id?{...m,points:Math.max(0,m.points+delta)}:m)} : g);
  sav('sc_groups',groups);
  activeUser.member.points = Math.max(0, activeUser.member.points+delta);
  document.getElementById('ptsBig').textContent = activeUser.member.points;
}
function closePts() { document.getElementById('ptsOverlay').style.display='none'; activeUser=null; render(); }

// ── PIN System ────────────────────────────────────────────────────────────────
function buildNumpad() {
  const keys = [1,2,3,4,5,6,7,8,9,'',0,'⌫'];
  document.getElementById('numpad').innerHTML = keys.map(k => {
    if(k==='') return `<button class="numpad-btn empty" disabled></button>`;
    if(k==='⌫') return `<button class="numpad-btn del" onclick="pinDel()">⌫</button>`;
    return `<button class="numpad-btn" onclick="pinPress('${k}')">${k}</button>`;
  }).join('');
}
function renderDots(len, filled, color) {
  document.getElementById('pinDots').innerHTML = Array.from({length:len}).map((_,i) => {
    const filled_i = i<filled;
    return `<div class="pin-dot" style="background:${filled_i?color:'transparent'};border:2px solid ${filled_i?color:'#444'};transform:${filled_i?'scale(1.25)':'scale(1)'}"></div>`;
  }).join('');
}
function openPinModal(icon, title, sub, color, isNew, savedPin, callback, showCancel) {
  pinColor = color; pinCallback = callback; pinIsNew = isNew;
  pinDigits = []; pinStep = isNew?'create':'enter'; pinFirst = null;
  document.getElementById('pinIcon').textContent = icon;
  document.getElementById('pinTitle').textContent = isNew ? t().createPin : title;
  document.getElementById('pinSub').textContent = isNew ? t().pinSub1 : sub;
  document.getElementById('pinError').textContent = '';
  document.getElementById('pinCancelBtn').textContent = t().cancel;
  document.getElementById('pinCancelBtn').style.display = showCancel?'block':'none';
  buildNumpad();
  renderDots(4, 0, color);
  document.getElementById('pinOverlay').style.display = 'flex';
  document.getElementById('pinModal').className = 'modal anim-pop';
}
function pinPress(d) {
  if(pinDigits.length>=4) return;
  pinDigits.push(d);
  renderDots(4, pinDigits.length, pinColor);
  document.getElementById('pinError').textContent = '';
  if(pinDigits.length===4) {
    const code = pinDigits.join('');
    setTimeout(()=>{
      if(!pinIsNew) {
        if(code===judgePin) { closePinModal(); pinCallback(null); }
        else { pinShake(t().wrong); }
      } else if(pinStep==='create') {
        pinFirst=code; pinDigits=[]; pinStep='confirm';
        document.getElementById('pinTitle').textContent = t().confirmPin;
        document.getElementById('pinSub').textContent = t().pinSub2;
        renderDots(4,0,pinColor);
      } else {
        if(code===pinFirst) {
          closePinModal();
          showPinCreated(code);
        } else { pinShake(t().mismatch); pinStep='create'; pinFirst=null; document.getElementById('pinTitle').textContent=t().createPin; document.getElementById('pinSub').textContent=t().pinSub1; }
      }
    },160);
  }
}
function pinDel() { if(pinDigits.length>0){pinDigits.pop(); renderDots(4,pinDigits.length,pinColor); document.getElementById('pinError').textContent='';} }
function pinShake(msg) {
  pinDigits=[];
  renderDots(4,0,pinColor);
  document.getElementById('pinError').textContent=msg;
  const m = document.getElementById('pinModal');
  m.className='modal anim-shake';
  setTimeout(()=>m.className='modal',700);
}
function closePinModal() { document.getElementById('pinOverlay').style.display='none'; }

function showPinCreated(code) {
  const L = t();
  document.getElementById('pinShowSub').textContent = L.pinShowSub;
  document.getElementById('pinShowNum').textContent = code;
  document.getElementById('pinShowNum').style.color = pinColor;
  document.getElementById('pinShowBox').style.background = pinColor+'18';
  document.getElementById('pinShowBox').style.border = `2px solid ${pinColor}66`;
  document.getElementById('pinShowWarn').textContent = '⚠️ '+L.pinShowWarn;
  document.getElementById('pinShowConfirmBtn').textContent = L.pinShowConfirm;
  document.getElementById('pinShowConfirmBtn').style.background = pinColor;
  document.getElementById('pinShowOverlay').style.display = 'flex';
  // store temporarily
  window._pendingNewPin = code;
}
function confirmPinShown() {
  const code = window._pendingNewPin;
  judgePin = code; sav('sc_judge',code);
  document.getElementById('pinShowOverlay').style.display='none';
  if(pinCallback) pinCallback(code);
}

// ── PIN entry points ──────────────────────────────────────────────────────────
function openJudgePin() {
  openPinModal('⚖️', t().enterPin, t().pinSub3, pendingMember.gColor, !judgePin, judgePin,
    ()=>{ const {member,gColor,gId}=pendingMember; pendingMember=null; openPtsPanel(member,gColor,gId); }, true);
}
function openManagePinModal() {
  openPinModal('🛡️', t().managePinTitle, t().managePinSub, '#38bdf8', !judgePin, judgePin,
    ()=>{ manageOpen=true; tab=2; render(); }, true);
}
function showResetPin() {
  openPinModal('👑', t().resetTitle, t().resetSub, '#e879f9', !judgePin, judgePin,
    ()=>{ document.getElementById('resetTitle').textContent=t().resetConfirm; document.getElementById('resetSub').textContent=t().resetConfirmSub; document.getElementById('resetCancelBtn').textContent=t().cancel; document.getElementById('resetOkBtn').textContent=t().yesReset; document.getElementById('resetOverlay').style.display='flex'; }, true);
}
function closeReset() { document.getElementById('resetOverlay').style.display='none'; }
function doReset() { groups=JSON.parse(JSON.stringify(INIT)); sav('sc_groups',groups); closeReset(); tab=0; manageOpen=false; render(); }

// ── Init ──────────────────────────────────────────────────────────────────────
render();
</script>
